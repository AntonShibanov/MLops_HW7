name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn numpy pandas

    - name: Run pipeline
      run: python ml_pipeline.py

    - name: Make pipeline reproducible
      run: |
        echo "Проверка артефактов..."
        ls -la model.pkl hyperparameters.json requirements.txt
        python -c "import pickle, json; model=pickle.load(open('model.pkl','rb')); \
        with open('hyperparameters.json') as f: params=json.load(f); \
        print(f'Воспроизведена модель с параметрами {params}')"

    - name: Upload artifacts (опционально)
      uses: actions/upload-artifact@v4
      with:
        name: ml-artifacts
        path: |
          model.pkl
          hyperparameters.json
          requirements.txt
